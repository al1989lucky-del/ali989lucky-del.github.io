<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Alisa</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{

background:#111;
font-family:Arial,sans-serif;
color:white;

display:flex;
justify-content:center;
align-items:center;

height:100vh;

}

.card{

width:380px;

background:#1b1b1b;

border-radius:20px;

padding:40px;

text-align:center;

box-shadow:0 0 40px rgba(0,0,0,.45);

}

img{

width:220px;
height:220px;

object-fit:cover;

border-radius:50%;

margin-bottom:25px;

border:3px solid #333;

}

h1{

font-size:36px;
margin-bottom:10px;

}

p{

opacity:.7;
margin-bottom:35px;

}

a{

display:block;

padding:15px;

margin:12px 0;

background:#2b2b2b;

color:white;

text-decoration:none;

border-radius:12px;

transition:.25s;

}

a:hover{

background:#444;

transform:scale(1.03);

}

</style>

</head>

<body>

<div class="card">

<img src="alisa.jpg">

<h1>ALISA</h1>

<p>Virtual Model • Second Life Resident</p>

<a href="#">📷 Flickr</a>

<a href="#">☁️ Bluesky</a>

<a href="#">🎮 Second Life</a>

<a href="#">🎁 Wishlist</a>

</div>

</body>
</html>
